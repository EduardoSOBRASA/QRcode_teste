<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação de Certificado SOBRASA</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
h1 { color: #0073aa; }
#resultado { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
a.pdf-btn { background:#0073aa; color:white; padding:10px 15px; text-decoration:none; border-radius:5px; display:inline-block; margin-top:10px; }
</style>
</head>
<body>

<h1>Verificação de Certificado SOBRASA</h1>
<div id="resultado"><p>Carregando...</p></div>

<script>
// URL do CSV publicado do Google Sheets (formato CSV)
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvN6NDDBEU5YAgXuOeDMwBitf-c14CPMv-U2MfyTuLUEO1mVSDUrMOWglyy5CxhQ/pub?output=csv&gid=793317621";

// Mapeamento das colunas (nomes exatos do cabeçalho da linha 3 da planilha)
const colunas = {
    numero: "NUMERO",
    aluno: "NOME",
    emissao: "EMISSÃO",
    validade: "VALIDADE",
    instrutor: "INSTRUTOR",
    escola: "ESCOLA",
    cursoPRO: "PRO",
    cursoAMADOR: "AMADOR",
    pdf: "PDF"
};

// Função para ler parâmetros da URL
function getParametro(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

// Função para processar CSV robusto (aceita vírgulas internas)
function parseCSV(text) {
    const linhas = text.split(/\r?\n/);
    // Ignorar as duas primeiras linhas (antes do cabeçalho)
    const dataLinhas = linhas.slice(2);
    // Cabeçalho
    const header = dataLinhas.shift().split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/(^"|"$)/g,'').trim());
    // Mapear cada linha em objeto
    const data = dataLinhas.map(linha => {
        const cols = linha.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
        if (!cols) return null;
        const obj = {};
        header.forEach((h,i)=>{ obj[h] = cols[i] ? cols[i].replace(/(^"|"$)/g,'').trim() : ""; });
        return obj;
    }).filter(x => x!==null);
    return data;
}

// Função principal
async function carregarCertificado() {
    const idCert = getParametro("id");
    if (!idCert) {
        document.getElementById("resultado").innerHTML = "<h2>Nenhum certificado informado ❌</h2>";
        return;
    }

    try {
        const res = await fetch(csvUrl);
        const csvText = await res.text();
        const data = parseCSV(csvText);

        const cert = data.find(d => d[colunas.numero] === idCert);

        if (!cert) {
            document.getElementById("resultado").innerHTML = "<h2>Certificado não cadastrado ❌</h2>";
            return;
        }

        // Determinar curso
        const curso = cert[colunas.cursoPRO] ? cert[colunas.cursoPRO] : cert[colunas.cursoAMADOR];

        // Montar HTML
        let html = `<h2>CERTIFICADO VÁLIDO ✅</h2>
        <p><strong>Número:</strong> ${cert[colunas.numero]}</p>
        <p><strong>Aluno:</strong> ${cert[colunas.aluno]}</p>
        <p><strong>Curso:</strong> ${curso}</p>
        <p><strong>Validade:</strong> ${cert[colunas.validade]}</p>
        <p><strong>Instrutor:</strong> ${cert[colunas.instrutor]}</p>
        <p><strong>Escola:</strong> ${cert[colunas.escola]}</p>`;

        // Botão PDF
        if (cert[colunas.pdf]) {
            html += `<p><a class="pdf-btn" href="${cert[colunas.pdf]}" target="_blank">📄 Ver certificado em PDF</a></p>`;
        }

        document.getElementById("resultado").innerHTML = html;

    } catch (err) {
        console.error(err);
        document.getElementById("resultado").innerHTML = "<h2>Erro ao carregar dados ❌</h2>";
    }
}

carregarCertificado();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Verificação de Certificado SOBRASA</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body {
font-family: Arial;
padding: 20px;
background: #f5f5f5;
}

#resultado {
background: white;
padding: 20px;
border-radius: 8px;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

iframe {
margin-top: 20px;
}

</style>

</head>

<body>

<h1>Verificação de Certificado SOBRASA</h1>

<div id="resultado">
Carregando...
</div>

<script>

// LINK CSV
const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSvN6NDDBEU5YAgXuOeDMwBitf-c14CPMv-U2MfyTuLUEO1mVSDUrMOWglyy5CxhQ/pub?output=csv&gid=793317621";


// NOMES DAS COLUNAS
const colunas = {

numero: "numero certificado",

aluno: "Nome",

emissao: "Data de emissao",

validade: "validade certificado",

instrutor: "Instrutor",

escola: "escola SELO OURO",

cursoPRO: "tipo PRO",

cursoAMADOR: "AMADOR",

pdf: "PDF"

};


// PEGAR ID
function getParametro(nome){

const params =
new URLSearchParams(window.location.search);

return params.get(nome);

}


// PRINCIPAL
function carregar(){

const id =
getParametro("id");

if(!id){

document.getElementById("resultado")
.innerHTML =
"<h2>Nenhum certificado informado ❌</h2>";

return;

}


// LER CSV COM PAPAPARSE
Papa.parse(csvUrl, {

download: true,

header: true,

skipEmptyLines: true,

complete: function(results) {

const data = results.data;


// PROCURAR CERTIFICADO
const cert =
data.find(d =>

d[colunas.numero] &&
d[colunas.numero].toString().trim()
=== id.toString().trim()

);


if(!cert){

document.getElementById("resultado")
.innerHTML =
"<h2>Certificado não cadastrado ❌</h2>";

return;

}


// DEFINIR CURSO
const curso =

cert[colunas.cursoPRO]
? cert[colunas.cursoPRO]
: cert[colunas.cursoAMADOR];


// MONTAR HTML
let html =

`<h2>CERTIFICADO VÁLIDO ✅</h2>

<p><strong>Número:</strong>
${cert[colunas.numero]}</p>

<p><strong>Aluno:</strong>
${cert[colunas.aluno]}</p>

<p><strong>Curso:</strong>
${curso}</p>

<p><strong>Validade:</strong>
${cert[colunas.validade]}</p>

<p><strong>Instrutor:</strong>
${cert[colunas.instrutor]}</p>

<p><strong>Escola:</strong>
${cert[colunas.escola]}</p>`;


// MOSTRAR PDF
if(cert[colunas.pdf]){

html +=

`<iframe
src="${cert[colunas.pdf]}"
width="100%"
height="650px"
style="border:1px solid #ccc;">
</iframe>`;

}


document.getElementById("resultado")
.innerHTML = html;

}

});

}

carregar();

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação de Certificado SOBRASA</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f5f5f5;
}

h1 {
    color: #0073aa;
}

#resultado {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

iframe {
    margin-top: 20px;
}
</style>

</head>

<body>

<h1>Verificação de Certificado SOBRASA</h1>

<div id="resultado">
Carregando...
</div>

<script>

// LINK DO CSV PUBLICADO
const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSvN6NDDBEU5YAgXuOeDMwBitf-c14CPMv-U2MfyTuLUEO1mVSDUrMOWglyy5CxhQ/pub?output=csv&gid=793317621";


// NOMES EXATOS DAS COLUNAS
const colunas = {

numero: "numero certificado",

aluno: "Nome",

emissao: "Data de emissao",

validade: "validade certificado",

instrutor: "Instrutor",

escola: "escola SELO OURO",

cursoPRO: "tipo PRO",

cursoAMADOR: "AMADOR",

pdf: "PDF"

};


// LER ID DA URL
function getParametro(name) {

const urlParams =
new URLSearchParams(window.location.search);

return urlParams.get(name);

}


// PROCESSAR CSV
function parseCSV(text) {

const linhas =
text.split(/\r?\n/);

// ignora linha 1 e 2
const dataLinhas =
linhas.slice(2);

// pega cabeçalho (linha 3)
const header =
dataLinhas.shift()
.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
.map(h =>
h.replace(/(^"|"$)/g,'').trim()
);


// converte linhas em objetos
const data =
dataLinhas.map(linha => {

const cols =
linha.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if (!cols) return null;

const obj = {};

header.forEach((h,i)=>{

obj[h] =
cols[i]
? cols[i].replace(/(^"|"$)/g,'').trim()
: "";

});

return obj;

}).filter(x => x!==null);

return data;

}



// FUNÇÃO PRINCIPAL
async function carregarCertificado() {

const idCert =
getParametro("id");

if (!idCert) {

document.getElementById("resultado")
.innerHTML =
"<h2>Nenhum certificado informado ❌</h2>";

return;

}

try {

const res =
await fetch(csvUrl);

const csvText =
await res.text();

const data =
parseCSV(csvText);


// NORMALIZA ESPAÇOS
data.forEach(d => {

Object.keys(d).forEach(k => {

if(d[k])
d[k] = d[k].trim();

});

});


// PROCURA CERTIFICADO
const cert =
data.find(d =>

d[colunas.numero] &&
d[colunas.numero].toString()
.trim() === idCert.toString().trim()

);


if (!cert) {

document.getElementById("resultado")
.innerHTML =
"<h2>Certificado não cadastrado ❌</h2>";

return;

}


// DEFINE CURSO
const curso =

cert[colunas.cursoPRO]
? cert[colunas.cursoPRO]
: cert[colunas.cursoAMADOR];


// MONTA RESULTADO
let html =

`<h2>CERTIFICADO VÁLIDO ✅</h2>

<p><strong>Número:</strong>
${cert[colunas.numero]}</p>

<p><strong>Aluno:</strong>
${cert[colunas.aluno]}</p>

<p><strong>Curso:</strong>
${curso}</p>

<p><strong>Validade:</strong>
${cert[colunas.validade]}</p>

<p><strong>Instrutor:</strong>
${cert[colunas.instrutor]}</p>

<p><strong>Escola:</strong>
${cert[colunas.escola]}</p>`;


// MOSTRA PDF
if (cert[colunas.pdf]) {

html +=

`<iframe
src="${cert[colunas.pdf]}"
width="100%"
height="650px"
style="border:1px solid #ccc; border-radius:5px;">
</iframe>`;

}


document.getElementById("resultado")
.innerHTML = html;

}

catch (err) {

console.error(err);

document.getElementById("resultado")
.innerHTML =
"<h2>Erro ao carregar dados ❌</h2>";

}

}

carregarCertificado();

</script>

</body>
</html>
